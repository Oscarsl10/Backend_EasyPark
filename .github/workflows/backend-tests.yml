name: Backend Tests

on:
  push:
    paths:
      - 'backend_EasyPark/**'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    paths:
      - 'backend_EasyPark/**'
      - '.github/workflows/backend-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Give mvnw permission
        working-directory: backend_EasyPark
        run: chmod +x mvnw

      - name: Run backend tests
        working-directory: backend_EasyPark
        run: ./mvnw test